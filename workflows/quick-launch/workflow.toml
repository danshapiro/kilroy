# Quick-launch workflow: stage a task + optional context, then run one agent.
# Intended for investigation/research tasks kicked off from an agentic chat.

name = "quick-launch"
description = "Single-agent task runner: stage a prompt (and optional context file), run the agent, collect result.md"
version = "0.1.0"

outputs = ["result.md"]

[[inputs]]
name = "prompt"
description = "Task description for the agent (short form). Required."
required = true

[[inputs]]
name = "context_file"
description = "Absolute path to a file to stage as .kilroy/CONTEXT.md for the agent to read. Optional."
required = false

[[inputs]]
name = "context"
description = "Inline context string to stage as .kilroy/CONTEXT.md. Ignored if context_file is set. Optional."
required = false

[defaults]
labels = { workflow = "quick-launch" }
